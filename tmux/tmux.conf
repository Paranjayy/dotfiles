# ============================================
# Theo (t3dotgg) Inspired Tmux Configuration
# EXACT COLORS from screenshot
# ============================================

# Prefix
set -g prefix C-b

# ============================================
# SHELL CONFIGURATION (ZSH)
# ============================================
set -g default-shell /bin/zsh
set -g default-command /bin/zsh
set -g history-file ~/.zsh_history

# Start windows at 0
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on

# Better splits
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Enable mouse
set -g mouse on

# ============================================
# SHORTCUTS - EXIT & DETACH
# ============================================

# Detach (session keeps running, can reattach)
bind d detach

# Detach and kill tmux server (back to normal shell)
bind D kill-server \; display "Tmux killed - back to normal"

# Quick quit with confirmation
bind Q confirm-before -p "Kill tmux server? (y/n)" kill-server

# ============================================
# SHORTCUTS - SESSION MANAGEMENT
# ============================================

# List sessions (fuzzy finder if available, otherwise list)
bind s list-sessions

# Create new named session
bind S command-prompt -p "Session name:" "new-session -s '%%'"

# Rename current session
bind R command-prompt -p "Rename session:" "rename-session '%%'"

# Switch to session by number
bind 0 switch-client -t 0
bind 1 switch-client -t 1
bind 2 switch-client -t 2
bind 3 switch-client -t 3
bind 4 switch-client -t 4
bind 5 switch-client -t 5
bind 6 switch-client -t 6
bind 7 switch-client -t 7
bind 8 switch-client -t 8
bind 9 switch-client -t 9

# ============================================
# SHORTCUTS - WINDOW MANAGEMENT
# ============================================

# New window in current path
bind c new-window -c "#{pane_current_path}"

# Rename current window
bind , command-prompt -p "Rename window:" "rename-window '%%'"

# Kill current window
bind X confirm-before -p "Kill window #W? (y/n)" kill-window

# Quick window switching (Shift+arrows)
bind -n S-Left previous-window
bind -n S-Right next-window

# Swap windows
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ============================================
# SHORTCUTS - PANE MANAGEMENT
# ============================================

# Vim-style pane navigation (after prefix)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Quick pane switching (Alt+arrow, no prefix needed)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Resize panes (repeatable with -r)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Break pane out to new window
bind ! break-pane -d -n "PANE_#I"

# Join pane from window (prompt for window number)
bind @ command-prompt -p "Join pane from window:" "join-pane -h -s '%%'"

# Kill current pane
bind x confirm-before -p "Kill pane #P? (y/n)" kill-pane

# Swap panes
bind { swap-pane -D
bind } swap-pane -U

# Even horizontal/vertical distribution
bind = select-layout even-horizontal
bind _ select-layout even-vertical

# ============================================
# SHORTCUTS - COPY MODE (Vim-style)
# ============================================

# Enter copy mode
bind [ copy-mode

# Vim-style copy mode
setw -g mode-keys vi

# Copy selection (v to start, y to copy)
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Copy to clipboard (macOS)
bind -T copy-mode-vi Y send-keys -X copy-pipe-and-cancel "pbcopy"

# ============================================
# SHORTCUTS - USEFUL EXTRAS
# ============================================

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Edit config quickly
bind e new-window -n "config" "nano ~/.tmux.conf"

# Open lazygit
bind g display-popup -w 80% -h 80% -E "lazygit" 2>/dev/null || true

# Open htop/bottom
bind t display-popup -w 80% -h 80% -E "btm 2>/dev/null || htop" 2>/dev/null || true

# Toggle status bar
bind b set status

# Zoom/unzoom current pane (fullscreen toggle)
bind z resize-pane -Z

# Show clock
bind T clock-mode

# Sync panes (type in all panes at once)
bind * set synchronize-panes\; display "Sync: #{?pane_synchronized,ON,OFF}"

# ============================================
# QUICK LAUNCH APPS (moved to regular bindings)
# See: bind g (lazygit), bind t (htop/btm)
# ============================================

# ============================================
# THEO'S EXACT COLORS (your palette)
# ============================================
set -g @tho_bg "#0B0C0C"          # TRUE BLACK background
set -g @tho_fg "#DBE1E0"          # Light text
set -g @tho_yellow "#FEFF06"      # Window index box
set -g @tho_pink "#FC00A2"        # Uptime box
set -g @tho_blue "#399FCB"        # Active tab
set -g @tho_muted "#797C79"       # Muted text/separators
set -g @tho_red "#CC0106"         # Username box
set -g @tho_orange "#FC7D02"      # Mid CPU
set -g @tho_yellow_cpu "#FFD30E"  # Higher CPU
set -g @tho_green "#55FD05"       # Healthy CPU
set -g @tho_white "#FFFFFF"       # White

# ============================================
# STATUS BAR
# ============================================
set -g status on
set -g status-position bottom
set -g status-style "bg=#{@tho_bg},fg=#{@tho_fg}"
set -g status-interval 2
set -g status-left-length 60
set -g status-right-length 120

# LEFT: Yellow box index + Pink uptime
set -g status-left "#[bg=#{@tho_yellow},fg=#{@tho_bg},bold] #I #[bg=#{@tho_pink},fg=#{@tho_bg}] #(uptime | sed 's/.*up/up/' | sed 's/,.*//' | xargs) "

# WINDOW TABS
setw -g window-status-format "#[bg=#{@tho_bg},fg=#{@tho_muted}] #I #W "
setw -g window-status-current-format "#[bg=#{@tho_blue},fg=#{@tho_bg},bold] #I #W "
setw -g window-status-separator ""

# RIGHT: CPU% + battery bar + time + date + WHITE/RED user + WHITE/BLACK host
set -g status-right "#[fg=#{@tho_green}]#(top -l 1 | grep 'CPU usage' | awk '{print $3}') #[fg=#{@tho_muted}]| #( ~/.tmux/battery_bar.sh ) #[fg=#{@tho_muted}]| #[fg=#{@tho_yellow}]%H:%M #[fg=#{@tho_muted}]| #[fg=#{@tho_fg}]%d %b #[fg=#{@tho_muted}]| #[bg=#{@tho_red},fg=#{@tho_white},bold] #(whoami) #[bg=#{@tho_white},fg=#{@tho_bg},bold] #H "

# ============================================
# PANE STYLING
# ============================================
set -g pane-border-style "fg=#{@tho_muted}"
set -g pane-active-border-style "fg=#{@tho_pink}"

# ============================================
# PLUGINS
# ============================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# TPM init - MUST be last line
run '~/.tmux/plugins/tpm/tpm'
